<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Task Manager</title>
  <style>
    body { font-family: sans-serif; background: #f4f6f9; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
    .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
    h2 { margin-top: 0; color: #333; text-align: center; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    button { background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    li { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 4px; border-left: 5px solid #2196F3; font-size: 14px; }
    .completed { text-decoration: line-through; color: #888; border-left-color: #ccc; }
    .del-btn { background: #f44336; padding: 5px 10px; font-size: 12px; }
  </style>
</head>
<body>

  <div class="card">
    <h2>📝 Task Dashboard</h2>
    
    <div class="input-group">
      <input type="text" id="taskTitle" placeholder="Enter a new task...">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    const API_URL = '/api/tasks';

    // 1. Fetch data from backend API and render list items
    async function loadTasks() {
      const res = await fetch(API_URL);
      const tasks = await res.json();
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      tasks.forEach(task => {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');
        
        li.innerHTML = `
          <span>${task.title}</span>
          <button class="del-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;
        list.appendChild(li);
      });
    }

    // 2. Submit a POST request to add a new document
    async function addTask() {
      const input = document.getElementById('taskTitle');
      if (!input.value.trim()) return;

      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: input.value })
      });

      input.value = '';
      loadTasks();
    }

    // 3. Submit a DELETE request to wipe out a specific item
    async function deleteTask(id) {
      await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    // Run automatically on page startup configuration
    loadTasks();
  </script>
</body>
</html>
